<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Grid Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-areas:
                "header header header header"
                "nav nav nav nav"
                "sidebar content content content"
                "footer footer footer footer";
            gap: 10px;
            padding: 10px;
        }

        header {
            grid-area: header;
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            grid-area: nav;
            background: #555;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .sidebar {
            grid-area: sidebar;
            background: #ddd;
            padding: 20px;
        }

        .content {
            grid-area: content;
            background: #fff;
            padding: 20px;
        }

        footer {
            grid-area: footer;
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* 📱 Tablet View */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                    "header header"
                    "nav nav"
                    "content content"
                    "sidebar sidebar"
                    "footer footer";
            }
        }

        /* 📱 Mobile View */
        @media (max-width: 480px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "header"
                    "nav"
                    "content"
                    "sidebar"
                    "footer";
            }
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Website</h1>
        </header>

        <nav>
            <p>Home | About | Contact</p>
        </nav>

        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>Links or info here</p>
        </div>

        <div class="content">
            <h2>Main Content</h2>
            <p>This is a responsive website using Grid and Media Query.</p>
        </div>

        <footer>
            <p>© 2026 My Website</p>
        </footer>
    </div>

</body>
</html>
